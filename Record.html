<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlotPoint - Record</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        /* Hide scrollbar for clean UI but allow scrolling */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom styling to remove default select arrow */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
    </style>
</head>
<body class="bg-[#f4f5f7] text-gray-900 h-screen w-screen overflow-hidden flex flex-col md:flex-row antialiased">

    <aside class="w-full md:w-[260px] bg-[#1e6b41] text-white flex flex-col shrink-0 md:h-full md:rounded-r-3xl shadow-lg z-20">
        <div class="p-6 md:p-8 flex items-center gap-3">
            <img src="PltPntLogo.png" alt="PlotPoint Logo" class="h-10 w-auto object-contain">
            <h1 class="text-2xl font-semibold tracking-tight">PlotPoint</h1>
        </div>

        <div class="flex-1 px-4 md:px-6 overflow-y-auto pb-6 space-y-8">
            <div>
                <h2 class="text-xs font-medium text-white/60 uppercase tracking-wider mb-3 px-2">Menu</h2>
                <nav class="space-y-1">
                    <a href="Dashboard.html" class="flex items-center gap-3 px-4 py-3 text-white/80 hover:bg-white/10 rounded-xl transition-colors text-base font-medium">
                        <iconify-icon icon="solar:widget-linear" class="text-xl opacity-70"></iconify-icon>
                        Dashboard
                    </a>
                    <a href="Record.html" class="flex items-center gap-3 px-4 py-3 text-white bg-white/20 rounded-xl transition-colors text-base font-medium shadow-sm border border-white/10">
                        <iconify-icon icon="solar:folder-with-files-linear" class="text-xl text-gray-900"></iconify-icon>
                        Record
                    </a>
                    <a href="Map.html" class="flex items-center gap-3 px-4 py-3 text-white/80 hover:bg-white/10 rounded-xl transition-colors text-base font-medium">
                        <iconify-icon icon="solar:map-point-linear" class="text-xl opacity-70"></iconify-icon>
                        Map
                    </a>
                </nav>
            </div>

            <div>
                <h2 class="text-xs font-medium text-white/60 uppercase tracking-wider mb-3 px-2">General</h2>
                <nav class="space-y-1">
                    <a href="Setting.html" class="flex items-center gap-3 px-4 py-3 text-white/80 hover:bg-white/10 rounded-xl transition-colors text-base font-medium">
                        <iconify-icon icon="solar:settings-linear" class="text-xl opacity-70"></iconify-icon>
                        Setting
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 text-white/80 hover:bg-white/10 rounded-xl transition-colors text-base font-medium">
                        <iconify-icon icon="solar:logout-2-linear" class="text-xl opacity-70"></iconify-icon>
                        Logout
                    </a>
                </nav>
            </div>
        </div>
    </aside>

<!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10">

        <!-- Top Bar (Search & Profile) -->
        <header class="bg-white rounded-[24px] shadow-[0_2px_10px_-4px_rgba(0,0,0,0.04)] m-4 p-2 pl-4 pr-3 flex items-center justify-between shrink-0">
            <!-- Search Container -->
            <div class="relative flex-1 max-w-lg flex items-center bg-gray-50/50 rounded-full border border-transparent focus-within:border-gray-200 focus-within:bg-white transition-all">
                <i data-lucide="search" class="absolute left-4 w-5 h-5 text-gray-400" stroke-width="1.5"></i>
                <input type="text" placeholder="Search name or house number" class="w-full bg-transparent pl-12 pr-4 py-2.5 text-base text-gray-700 placeholder-gray-400 focus:outline-none rounded-full">
            </div>

            <!-- Profile Section -->
            <div class="flex items-center gap-3 pl-4 border-l border-gray-100 ml-4">
                <div class="hidden sm:flex flex-col items-end">
                    <span class="text-sm font-medium text-gray-900 leading-tight">Jigo Tapia</span>
                    <span class="text-xs text-gray-500">jigotapia@gmail.com</span>
                </div>
                <img src="https://i.pravatar.cc/150?img=47" alt="Profile" class="w-10 h-10 rounded-full object-cover border border-gray-200">
            </div>
        </header>

        <!-- Records Card & Table -->
        <div class="mx-4 mb-4 bg-white rounded-[24px] shadow-[0_2px_10px_-4px_rgba(0,0,0,0.04)] flex-1 overflow-hidden flex flex-col relative border border-gray-100">

            <!-- Card Header -->
            <div class="px-8 py-6 flex items-center justify-between shrink-0">
                <h2 class="text-2xl font-semibold text-[#16602e] tracking-tight">Records</h2>
                <button onclick="openModal()" class="bg-[#247b3b] hover:bg-[#1a5e2b] text-white px-5 py-2.5 rounded-xl text-base font-medium flex items-center gap-2 transition-all shadow-sm active:scale-95">
                    <i data-lucide="plus" class="w-4 h-4" stroke-width="2"></i>
                    Add
                </button>
            </div>

            <!-- Table Structure -->
            <div class="flex-1 flex flex-col overflow-hidden">
                <!-- Table Header Row -->
                <div class="mx-8 bg-[#b8d8be] rounded-xl px-6 py-3 grid grid-cols-[1.5fr_2fr_1.5fr_1.5fr_1fr_1fr] gap-4 text-sm font-medium text-gray-800 uppercase tracking-wider shrink-0">
                    <div>Name</div>
                    <div>Email</div>
                    <div>Phone</div>
                    <div>House Number</div>
                    <div>Type</div>
                </div>

                <!-- Table List Area -->
                <div id="record-list" class="flex-1 overflow-y-auto hide-scrollbar pb-6 mt-2">
                    <!-- JavaScript will inject rows here -->
                </div>
            </div>
        </div>

    </main>

    <!-- Add Record Modal (Hidden by default) -->
    <div id="addModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-300" id="modalContent">

            <!-- Modal Header -->
            <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-lg font-medium text-gray-900 tracking-tight">Add New Record</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded-md hover:bg-gray-100">
                    <i data-lucide="x" class="w-5 h-5" stroke-width="1.5"></i>
                </button>
            </div>

            <!-- Modal Form -->
            <form id="addRecordForm" class="p-6 space-y-5" onsubmit="saveRecord(event)">

                <div class="space-y-1.5">
                    <label class="block text-sm font-medium text-gray-700">Full Name</label>
                    <input type="text" id="inputName" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-base text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#1e6b41]/20 focus:border-[#1e6b41] transition-all bg-white shadow-sm">
                </div>

                <div class="space-y-1.5">
                    <label class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input type="email" id="inputEmail" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-base text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#1e6b41]/20 focus:border-[#1e6b41] transition-all bg-white shadow-sm">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="block text-sm font-medium text-gray-700">Phone Number</label>
                        <input type="text" id="inputPhone" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-base text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#1e6b41]/20 focus:border-[#1e6b41] transition-all bg-white shadow-sm">
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-sm font-medium text-gray-700">House/Lot No.</label>
                        <input type="text" id="inputHouse" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-base text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#1e6b41]/20 focus:border-[#1e6b41] transition-all bg-white shadow-sm">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="block text-sm font-medium text-gray-700">Resident Type</label>
                    <div class="relative">
                        <select id="inputType" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-base text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#1e6b41]/20 focus:border-[#1e6b41] transition-all bg-white shadow-sm cursor-pointer pr-10">
                            <option value="Owner">Owner</option>
                            <option value="Renter">Renter</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-gray-400">
                            <i data-lucide="chevron-down" class="w-4 h-4" stroke-width="1.5"></i>
                        </div>
                    </div>
                </div>

                <!-- Modal Actions -->
                <div class="pt-4 flex gap-3 justify-end border-t border-gray-100 mt-6">
                    <button type="button" onclick="closeModal()" class="px-5 py-2.5 rounded-xl text-base font-medium text-gray-700 hover:bg-gray-100 transition-colors">Cancel</button>
                    <button type="submit" class="bg-[#247b3b] hover:bg-[#1a5e2b] text-white px-6 py-2.5 rounded-xl text-base font-medium transition-colors shadow-sm">Save Record</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Step 6: Sample Data Initialization
        let recordsData = [
            { id: 1, name: "Jigo Tapia", email: "jigo@mail.com", phone: "123-456-7890", house: "Lot 12", type: "Owner"},
            { id: 2, name: "Maria Santos", email: "maria.s@example.com", phone: "098-765-4321", house: "Lot 15B", type: "Renter"},
            { id: 3, name: "Robert Chen", email: "rchen@domain.co", phone: "555-019-2834", house: "Block 4 Lot 2", type: "Owner" }
        ];

        const recordListContainer = document.getElementById('record-list');
        const modal = document.getElementById('addModal');
        const modalContent = document.getElementById('modalContent');
        const form = document.getElementById('addRecordForm');

        // Step 5: Render List Function
        function renderRecords() {
            recordListContainer.innerHTML = ''; // Clear current list

            recordsData.forEach(record => {
                // Create row container matching the header grid
                const rowElement = document.createElement('div');
                rowElement.className = 'mx-8 px-6 py-4 border-b border-gray-100 grid grid-cols-[1.5fr_2fr_1.5fr_1.5fr_1fr_1fr] gap-4 text-base text-gray-600 items-center hover:bg-gray-50/50 transition-colors duration-150 group';


                rowElement.innerHTML = `
                    <div class="font-medium text-gray-900 truncate pr-2">${record.name}</div>
                    <div class="truncate pr-2">${record.email}</div>
                    <div class="truncate pr-2">${record.phone}</div>
                    <div class="truncate pr-2">${record.house}</div>
                    <div>
                        <span class="inline-flex items-center px-2 py-1 rounded-md text-sm font-medium bg-gray-100/80 text-gray-700 border border-gray-200/60">
                            ${record.type}
                        </span>
                    </div>
                `;

                recordListContainer.appendChild(rowElement);
            });

            // Re-initialize icons just in case we add SVGs dynamically later
            lucide.createIcons();
        }

        // Modal Controls
        function openModal() {
            modal.classList.remove('hidden');
            // Small delay to allow display:block to apply before animating opacity
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);

            // Focus first input
            document.getElementById('inputName').focus();
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');

            // Wait for transition to finish before hiding
            setTimeout(() => {
                modal.classList.add('hidden');
                form.reset(); // Clear form inputs on close
            }, 300);
        }

        // Step 4: Handle Form Submission
        function saveRecord(e) {
            e.preventDefault(); // Prevent page reload

            // Collect values
            const newRecord = {
                id: Date.now(),
                name: document.getElementById('inputName').value,
                email: document.getElementById('inputEmail').value,
                phone: document.getElementById('inputPhone').value,
                house: document.getElementById('inputHouse').value,
                type: document.getElementById('inputType').value,
            };

            // Update state
            recordsData.unshift(newRecord); // Add to beginning of array

            // Re-render and close
            renderRecords();
            closeModal();
        }

        // Initial Render on Load
        window.addEventListener('DOMContentLoaded', renderRecords);

    </script>
</body>
</html>
