    <script>
        // Expanded Master Data Array (48 Plots)
        let masterData = [];
        for (let i = 101; i <= 148; i++) {
            // Seed some random initial data for realism
            const isOccupied = Math.random() > 0.5;
            masterData.push({
                id: i.toString(),
                isOccupied: isOccupied,
                owner: isOccupied ? `Owner ${i}` : '',
                contact: isOccupied ? `(555) 000-${i}` : '',
                houseNumber: i.toString()
            });
        }

        // Manual overrides for a few recognizable names
        masterData.find(d => d.id === '101').owner = 'Sarah Connor';
        masterData.find(d => d.id === '101').isOccupied = true;
        masterData.find(d => d.id === '103').owner = 'John Wick';
        masterData.find(d => d.id === '103').isOccupied = true;
        masterData.find(d => d.id === '115').owner = 'Diana Prince';
        masterData.find(d => d.id === '115').isOccupied = true;
        masterData.find(d => d.id === '132').owner = 'Bruce Wayne';
        masterData.find(d => d.id === '132').isOccupied = true;

        const plots = document.querySelectorAll('.plot');

        // Render Map Colors
        function renderMap() {
            plots.forEach(plot => {
                const plotId = plot.getAttribute('data-id');
                const data = masterData.find(d => d.id === plotId);

                // Clear previous state classes
                plot.classList.remove('bg-[#377f3e]', 'bg-[#d1d1d1]');

                if (data && data.isOccupied) {
                    plot.classList.add('bg-[#377f3e]');
                    plot.title = `Lot ${plotId} - Occupied\nOwner: ${data.owner}`;
                } else {
                    plot.classList.add('bg-[#d1d1d1]');
                    plot.title = `Lot ${plotId} - Vacant`;
                }
            });
        }

        renderMap();

        // Search Functionality
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();

            plots.forEach(plot => {
                const plotId = plot.getAttribute('data-id');
                const data = masterData.find(d => d.id === plotId);

                let matches = false;
                if (data) {
                    if (data.owner && data.owner.toLowerCase().includes(searchTerm)) matches = true;
                    if (data.houseNumber && data.houseNumber.includes(searchTerm)) matches = true;
                    if (data.id.includes(searchTerm)) matches = true;
                }

                if (searchTerm === '' || matches) {
                    plot.classList.remove('opacity-20', 'scale-95');
                    plot.classList.add('hover:scale-105');
                    if (matches && searchTerm !== '') {
                         plot.classList.add('ring-4', 'ring-[#377f3e]/40', 'ring-offset-2');
                    } else {
                         plot.classList.remove('ring-4', 'ring-[#377f3e]/40', 'ring-offset-2');
                    }
                } else {
                    plot.classList.add('opacity-20', 'scale-95');
                    plot.classList.remove('hover:scale-105', 'ring-4', 'ring-[#377f3e]/40', 'ring-offset-2');
                }
            });
        });

        // Modal Elements & State
        const modal = document.getElementById('detailsModal');
        const modalContent = document.getElementById('modalContent');
        const closeModalBtn = document.getElementById('closeModal');

        const mTitle = document.getElementById('modalTitle');
        const mStatusContainer = document.getElementById('modalStatusContainer');
        const mLotNum = document.getElementById('modalLotNumber');

        const mOwnerSection = document.getElementById('ownerSection');
        const mOwnerName = document.getElementById('modalOwnerName');
        const editOwnerName = document.getElementById('editOwnerName');

        const mContactSection = document.getElementById('contactSection');
        const mContact = document.getElementById('modalContact');
        const editContact = document.getElementById('editContact');

        const mActionBtn = document.getElementById('modalActionBtn');
        const mCancelBtn = document.getElementById('modalCancelBtn');

        let currentPlotId = null;
        let isEditing = false;

        // Toast Notification Function
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        document.getElementById('mainAddRecordBtn').addEventListener('click', () => {
            showToast("Please click on a vacant plot (gray) on the map to add a new record.");
        });

        // Switch to View Mode UI
        function setViewMode(data) {
            isEditing = false;

            // Hide Inputs, Show Text
            editOwnerName.classList.add('hidden');
            editContact.classList.add('hidden');
            mOwnerName.classList.remove('hidden');
            mContact.classList.remove('hidden');
            mCancelBtn.classList.add('hidden');
            mTitle.textContent = "Plot Details";

            mLotNum.textContent = data.id;

            if (data.isOccupied) {
                mStatusContainer.className = 'inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-sm font-medium bg-green-50 text-green-700 border border-green-200/50 mb-2';
                mStatusContainer.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span> Occupied`;

                mOwnerSection.classList.remove('hidden');
                mContactSection.classList.remove('hidden');
                mOwnerName.textContent = data.owner || 'Unknown';
                mContact.textContent = data.contact || 'No contact on file';

                mActionBtn.innerHTML = '<iconify-icon icon="solar:pen-linear" class="text-lg"></iconify-icon> Edit Record';
                mActionBtn.className = 'bg-gray-900 hover:bg-gray-800 text-white px-5 py-2.5 rounded-xl font-medium transition-colors shadow-sm w-full sm:w-auto flex items-center justify-center gap-2';
            } else {
                mStatusContainer.className = 'inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-sm font-medium bg-gray-100 text-gray-700 border border-gray-200 mb-2';
                mStatusContainer.innerHTML = `<span class="w-2 h-2 rounded-full bg-gray-400"></span> Plot Available`;

                mOwnerSection.classList.add('hidden');
                mContactSection.classList.add('hidden');

                mActionBtn.innerHTML = '<iconify-icon icon="solar:add-circle-linear" class="text-lg"></iconify-icon> Add Record';
                mActionBtn.className = 'bg-[#377f3e] hover:bg-[#2e6b34] text-white px-5 py-2.5 rounded-xl font-medium transition-colors shadow-sm w-full sm:w-auto flex items-center justify-center gap-2';
            }
        }

        // Switch to Edit Mode UI
        function setEditMode() {
            isEditing = true;
            const data = masterData.find(d => d.id === currentPlotId);

            mTitle.textContent = data.isOccupied ? "Edit Record" : "New Record";

            // Show fields even if vacant
            mOwnerSection.classList.remove('hidden');
            mContactSection.classList.remove('hidden');

            // Hide Text, Show Inputs
            mOwnerName.classList.add('hidden');
            mContact.classList.add('hidden');
            editOwnerName.classList.remove('hidden');
            editContact.classList.remove('hidden');
            mCancelBtn.classList.remove('hidden');

            // Pre-fill inputs
            editOwnerName.value = data.owner || '';
            editContact.value = data.contact || '';

            // Focus first input
            setTimeout(() => editOwnerName.focus(), 100);

            mActionBtn.innerHTML = '<iconify-icon icon="solar:diskette-linear" class="text-lg"></iconify-icon> Save Record';
            mActionBtn.className = 'bg-[#377f3e] hover:bg-[#2e6b34] text-white px-5 py-2.5 rounded-xl font-medium transition-colors shadow-sm w-full sm:w-auto flex items-center justify-center gap-2';
        }

        // Save Data Logic
        function saveRecord() {
            const index = masterData.findIndex(d => d.id === currentPlotId);
            if (index !== -1) {
                const newOwner = editOwnerName.value.trim();
                const newContact = editContact.value.trim();

                masterData[index].owner = newOwner;
                masterData[index].contact = newContact;
                // If owner is provided, it's occupied. If cleared entirely, make it vacant.
                masterData[index].isOccupied = newOwner.length > 0;

                renderMap();
                setViewMode(masterData[index]);
                showToast("Record saved successfully!");
            }
        }

        // Action Button Click Handler (Toggles Edit/Save)
        mActionBtn.addEventListener('click', () => {
            if (!isEditing) {
                setEditMode();
            } else {
                saveRecord();
            }
        });

        // Cancel Button Handler
        mCancelBtn.addEventListener('click', () => {
            const data = masterData.find(d => d.id === currentPlotId);
            setViewMode(data);
        });

        // Open Modal
        function openModal(data) {
            currentPlotId = data.id;
            setViewMode(data);

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        // Close Modal
        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                isEditing = false;
            }, 300);
        }

        // Attach Clicks to Plots
        plots.forEach(plot => {
            plot.addEventListener('click', (e) => {
                const plotId = e.currentTarget.getAttribute('data-id');
                const data = masterData.find(d => d.id === plotId);
                if (data) openModal(data);
            });
        });

        // Modal Close Triggers
        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            // Close if clicking outside the modal content and not currently editing
            if (e.target === modal && !isEditing) closeModal();
        });

    </script>
</body>
</html>
